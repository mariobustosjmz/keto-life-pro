<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0D3B2E">
  <meta name="color-scheme" content="light dark">
  <meta name="description" content="KetoLife Pro — Seguimiento de dieta keto + ayuno 16:8">
  <title>KetoLife Pro</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="css/tokens.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/dashboard.css">
  <link rel="stylesheet" href="css/meals.css">
  <link rel="stylesheet" href="css/habits.css">
  <link rel="icon" type="image/svg+xml" href="icons/favicon.svg">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
</head>
<body>
  <div id="app" class="app">
    <header class="top-bar" role="banner">
      <h1 class="top-bar__title" data-i18n="app.title">KetoLife Pro</h1>
      <div class="top-bar__actions" role="group" aria-label="Acciones rápidas">
        <button id="btn-test-notif" class="icon-btn" type="button" aria-label="Probar notificación" title="Probar notificación">
          <svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/>
            <path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"/>
          </svg>
        </button>
        <button id="btn-lang" class="lang-btn" type="button" aria-label="Cambiar idioma">EN</button>
      </div>
    </header>

    <main class="main" role="main" aria-live="polite">
      <section id="panel-today" class="panel" data-section="today">
        <h2 class="panel-title" data-i18n="nav.today">Hoy</h2>
        <p data-i18n="today.placeholder">El panel de hoy se cargará próximamente.</p>
      </section>

      <section id="panel-meals" class="panel" data-section="meals">
        <h2 class="panel-title" data-i18n="nav.meals">Comidas</h2>
      </section>

      <section id="panel-habits" class="panel" data-section="habits">
        <h2 class="panel-title" data-i18n="nav.habits">Hábitos</h2>
        <p data-i18n="habits.placeholder">Marca tus hábitos diarios.</p>
      </section>

      <section id="panel-foods" class="panel" data-section="foods">
        <h2 class="panel-title" data-i18n="nav.foods">Alimentos</h2>
        <p data-i18n="foods.placeholder">Guía de alimentos keto.</p>
      </section>

      <section id="panel-more" class="panel" data-section="more">
        <h2 class="panel-title" data-i18n="nav.more">Más</h2>
        <p data-i18n="more.placeholder">Configuración, peso, evidencia y exportación.</p>
      </section>
    </main>

    <nav class="bottom-nav" role="navigation" aria-label="Navegación principal">
      <button class="nav-item is-active" type="button" data-section="today" aria-label="Hoy" aria-current="page">
        <span class="nav-item__icon" aria-hidden="true"><svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg></span>
        <span class="nav-item__label" data-i18n="nav.today">Hoy</span>
      </button>
      <button class="nav-item" type="button" data-section="meals" aria-label="Comidas">
        <span class="nav-item__icon" aria-hidden="true"><svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7v9a3 3 0 0 0 3 3h12a3 3 0 0 0 3-3V7"/><path d="M7 7V5a2 2 0 0 1 2-2h6a2 2 0 0 1 2 2v2"/><path d="M12 14v-2"/></svg></span>
        <span class="nav-item__label" data-i18n="nav.meals">Comidas</span>
      </button>
      <button class="nav-item" type="button" data-section="habits" aria-label="Hábitos">
        <span class="nav-item__icon" aria-hidden="true"><svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg></span>
        <span class="nav-item__label" data-i18n="nav.habits">Hábitos</span>
      </button>
      <button class="nav-item" type="button" data-section="foods" aria-label="Alimentos">
        <span class="nav-item__icon" aria-hidden="true"><svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a10 10 0 0 1 0 20 10 10 0 0 1 0-20"/><path d="M12 12a3 3 0 0 1 0 6 3 3 0 0 1 0-6"/></svg></span>
        <span class="nav-item__label" data-i18n="nav.foods">Alimentos</span>
      </button>
      <button class="nav-item" type="button" data-section="more" aria-label="Más">
        <span class="nav-item__icon" aria-hidden="true"><svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg></span>
        <span class="nav-item__label" data-i18n="nav.more">Más</span>
      </button>
    </nav>
  </div>

  <script src="js/data/i18n.js"></script>
  <script src="js/data/keto-foods.js"></script>
  <script src="js/time.js"></script>
  <script src="js/db.js"></script>
  <script src="js/notifications.js"></script>
  <script src="js/components/foods.js"></script>
  <script src="js/components/meals.js"></script>
  <script src="js/components/dashboard.js"></script>
  <script src="js/components/habits.js"></script>
  <script src="js/components/more.js"></script>
  <script src="js/app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js', { scope: './' })
        .then(reg => console.log('Service Worker registrado:', reg.scope))
        .catch(err => console.error('Error al registrar Service Worker:', err));
    }
  </script>
</body>
</html>
